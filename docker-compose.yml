name: agent-broker

services:
  broker:
    build: .
    container_name: agent-broker
    env_file: .env
    ports:
      - "127.0.0.1:${DELPHI_PORT}:8420"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    environment:
      - DELPHI_HOST=0.0.0.0
      - DELPHI_DB_PATH=/app/data/delphi.db
      - DELPHI_MCP_HOST_REGISTRY=127.0.0.1:*,localhost:*
      - DELPHI_MCP_ORIGIN_REGISTRY=http://127.0.0.1:${DELPHI_PORT},http://localhost:${DELPHI_PORT}
      - DELPHI_NUDGE_SWEEP_ENABLED=true
      - DELPHI_MCP_SESSION_MANAGER_ENABLED=true
    restart: always
