name: agent-broker

# All environment configuration lives in .env (single SSOT).
# Compose only references primitives the compose stage itself needs (ports, volumes).
# No inline defaults, no hardcoded literals, no `environment:` block.
services:
  broker:
    build: .
    container_name: agent-broker
    env_file: .env
    ports:
      # Pi-local agents (pi-claude, pi-codex) reach broker via localhost.
      - "127.0.0.1:${DELPHI_PORT}:8420"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    restart: always
