{% extends "base.html" %}
{% block title %}New task — Task Dispatch{% endblock %}
{% block content %}
<main class="container">
  <h1>New task</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/web/v3/new">
    <label>
      <span>Title</span>
      <input type="text" name="title" required maxlength="200" placeholder="short label, shown in lists">
    </label>

    <label>
      <span>Orchestrator</span>
      <select name="orchestrator_id" required>
        {% for a in agents %}
        <option value="{{ a.agent_id }}" {% if a.agent_id == default_orchestrator %}selected{% endif %}>
          {{ a.agent_id }} ({{ a.host }} · {{ a.role }})
        </option>
        {% endfor %}
      </select>
      <span class="hint">Once chosen, this agent is precluded from worker roles in this task (independence rule).</span>
    </label>

    <label>
      <span>Problem text</span>
      <textarea name="problem_text" required rows="10" placeholder="The full problem statement. Be specific about deliverables, constraints, and acceptance criteria."></textarea>
    </label>

    <details>
      <summary>Advanced — task JSON (optional)</summary>
      <label>
        <span>task_json</span>
        <textarea name="task_json" rows="6" placeholder='{"deliverables": [...], "constraints": [...]}'></textarea>
        <span class="hint">Optional structured fields the orchestrator can use beyond the prose problem text.</span>
      </label>
    </details>

    <div class="actions">
      <button type="submit" class="btn btn-primary">Create task</button>
      <a href="/web/v3/" class="btn">Cancel</a>
    </div>
  </form>
</main>
{% endblock %}
